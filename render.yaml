# ──────────────────────────────────────────────────────────────────────────
#  Render Blueprint — Backend API + Frontend Dashboard
#  Docs: https://docs.render.com/blueprint-spec
# ──────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI inference API ────────────────────────────────────
  - type: web
    name: market-regime-detector
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: python run_api.py
    healthCheckPath: /health
    envVars:
      - key: BINANCE_API_URL
        value: https://api.binance.com
      - key: MODEL_PATH
        value: models
      - key: PYTHON_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Frontend: React Dashboard (Vite static site) ─────────────────────
  - type: web
    name: market-regime-dashboard
    runtime: static
    region: oregon
    plan: free
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://market-regime-detector.onrender.com
