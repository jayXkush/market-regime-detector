# ──────────────────────────────────────────────────────────────────────────
#  Render Blueprint — Backend API (Python)
#  Docs: https://docs.render.com/blueprint-spec
# ──────────────────────────────────────────────────────────────────────────

services:
  # ── Backend: FastAPI inference API ────────────────────────────────────
  - type: web
    name: market-regime-detector
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: python run_api.py
    healthCheckPath: /health
    envVars:
      - key: BINANCE_API_URL
        value: https://api.binance.com
      - key: MODEL_PATH
        value: models
      - key: PYTHON_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
